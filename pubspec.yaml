name: speedonet
description: Speedonet broadband app
version: 1.1.1


environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter_native_contact_picker: 0.0.11
  flutter:
    sdk: flutter


  socket_io_client: ^2.0.3+1
  google_maps_flutter: ^2.6.0

  geolocator: ^13.0.0
  http: ^1.2.0
  flutter_map: ^7.0.2
  latlong2:    ^0.9.1
  agora_rtc_engine: ^6.3.2



  #icons
  hugeicons: ^1.1.5
  phosphor_flutter: ^2.0.0

  tutorial_coach_mark: ^1.2.9

  #notification_listener_service
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # HTTP client
  dio: ^5.4.3

  #font styled
  google_fonts: ^6.2.1

  # Local token storage
  shared_preferences: ^2.2.3

  #no internet
  connectivity_plus: ^6.0.3

  #webview
  webview_flutter: ^4.10.0

  #phone_numbers
  permission_handler: ^11.3.1


  #svg
  flutter_svg: ^2.0.10

  # Atom Pay official Flutter SDK (handles WebView, encryption, callbacks internally)
  ntt_atom_flutter: ^1.0.5

  share_plus: 12.0.1

  url_launcher: ^6.3.0
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.6
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon/app_logo.png"
  adaptive_icon_background: "#E31E24"
  adaptive_icon_foreground: "assets/app_icon/app_logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/speedo_prime.png
    - assets/images/speedo_tv.png
    - assets/images/refer_friend.png
    - assets/images/support.png
    - assets/images/refer_banner.png
    - assets/images/login_rocket.png
    - assets/images/signup_illustration.png
    - assets/images/onboarding_1.png
    - assets/images/onboarding_2.png
    - assets/images/onboarding_3.png
    - assets/images/loading_screen.jpeg
    - assets/app_icon/
    - assets/images/
    - assets/icons/
    - assets/icons/bottom_navigation/