name: speedonet
description: Speedonet broadband app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client with interceptors
  dio: ^5.4.3

  # Local token storage (simple key-value)
  shared_preferences: ^2.2.3

  # Existing deps (keep whatever you already have)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true