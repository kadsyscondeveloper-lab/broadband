name: speedonet
description: Speedonet broadband app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  #icons
  hugeicons: ^1.1.5
  phosphor_flutter: ^2.0.0

  # HTTP client
  dio: ^5.4.3

  # Local token storage
  shared_preferences: ^2.2.3

  # Atom Pay official Flutter SDK (handles WebView, encryption, callbacks internally)
  ntt_atom_flutter: ^1.0.5

  url_launcher: ^6.3.0
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/speedo_prime.png
    - assets/images/speedo_tv.png
    - assets/images/refer_a_friend.png